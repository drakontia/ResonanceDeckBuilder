# ブランチ命名規則に従う

## Action

ブランチ名は以下のパターンのいずれかを使用すること:

| パターン | 用途 |
|---------|------|
| `feature/add-{name}` | 新キャラ・新装備・新機能追加 |
| `feature/fix-{thing}` | 機能修正 |
| `fix/{thing}` | バグ修正 |
| `drakontia/issue-{N}` | Issue 番号に紐づく作業（Copilot Coding Agent） |

## Evidence

- 50 件のマージコミットのブランチ名を分析
- `feature/` prefix が最多 (60%)、次いで `fix/` (15%)、`drakontia/` (15%)

