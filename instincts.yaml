# 翻訳は 5 ロケールファイルを常にセットで更新する

## Action

`messages/` 以下のファイルを更新するとき、**5 ファイル全てを同時に**更新すること。

```
messages/cn.json
messages/en.json
messages/jp.json
messages/ko.json
messages/tw.json
```

1 ロケールだけ更新すると、他言語で表示が欠落する。

## Evidence

- messages/jp.json (27回), messages/en.json (21回), messages/ko.json (14回), messages/cn.json (13回), messages/tw.json (13回) がほぼ同頻度で変更されており、ほぼ常に同じコミットに含まれている

