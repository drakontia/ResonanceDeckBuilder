# Conventional Commits プレフィックス + 日本語説明を使用する

## Action

コミットメッセージは `<type>: <説明>` 形式で書くこと。
説明は日本語・英語どちらも許容されるが、日本語が多い。

```
feat:     新機能・新キャラ・新装備の追加
fix:      バグ修正・データ誤り訂正
chore:    ビルド設定・依存関係の更新
docs:     ドキュメント更新
style:    フォーマット修正（機能変更なし）
refactor: リファクタリング
test:     テスト追加・修正
```

例:
- `feat: Add Ruby (ID: 10001314) character implementation`
- `fix: ルビーの並並順を修正`

## Evidence

- 200 コミット中: feat(20), fix(18), chore(1), docs(1), style(1), refactor(1)
- 英語 prefix + 日本語説明のハイブリッドスタイルが多数

