messages/cn.json      ← 全ロケールを必ずセットで更新
messages/en.json
messages/jp.json
messages/ko.json
messages/tw.json
```

## Evidence

- 装備追加コミット（feat: 新装備追加等）を分析すると、上記ファイルが常にセットで変更されている
- `lib/equipDb.ts` と `lib/imgDb.ts` の同時変更が装備追加パターンの典型
