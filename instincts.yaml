# 新キャラクター追加は 8 ファイルをセットで更新する

## Action

新キャラクターを追加するとき、以下のファイルを**必ずすべて**更新すること。
1 ファイルでも欠けるとデータ不整合が発生する。

```
lib/charDb.ts         ← キャラクターマスター（ID・ステータス）
lib/breakDb.ts        ← 突破（ブレーク）データ
lib/cardDb.ts         ← カードデータ
lib/charSkillMap.ts   ← キャラ↔スキルのマッピング
lib/skillDb.ts        ← スキルデータ
lib/talentDb.ts       ← タレントデータ
lib/imgDb.ts          ← 画像URLマッピング
messages/jp.json      ← 日本語テキスト（最低限必須）
```

オプション（存在する場合）:
- `lib/homeSkillDb.ts` ← ホームスキル

## Evidence

- 分析した 50 件のキャラ追加コミットで、上記 8 ファイルが**常にセット**で変更されている
- `lib/charDb.ts` は 200 コミット中 20 回変更され、その大半が他の lib ファイルと同時変更

