# テストファイルは tests/ ディレクトリ以下に配置する

## Action

テストファイルは以下のディレクトリ構成に従って配置すること:

```
tests/unit/components/   ← コンポーネントの単体テスト (.test.tsx)
tests/unit/hooks/        ← カスタムフックのテスト (.test.tsx)
tests/unit/utils/        ← ユーティリティ関数のテスト (.test.ts)
tests/e2e/               ← E2E テスト (.spec.ts)
```

テストコマンド:
- `pnpm test` — Vitest（ウォッチモード）
- `pnpm coverage` — カバレッジレポート（80% 閾値）
- `pnpm test:e2e` — Playwright E2E

## Evidence

- git 履歴から検出されたテストファイルのパスがこのパターンに一致
- tests/unit/components/, tests/unit/hooks/, tests/unit/utils/, tests/e2e/ の全ディレクトリを確認

